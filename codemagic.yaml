workflows:
  ios-release:
    name: Physics Practical Coach - iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: <Physics Practical Exam Coach>
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.physicscoach.app
      vars:
        XCODE_WORKSPACE: "PhysicsPracticalCoach.xcodeproj"
        XCODE_SCHEME: "PhysicsPracticalCoach"
      xcode: latest
    scripts:
      - name: Install XcodeGen and generate project
        script: |
          brew install xcodegen
          cd PhysicsPracticalCoach
          xcodegen generate
      - name: Set up code signing
        script: |
          cd PhysicsPracticalCoach
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build
        script: |
          cd PhysicsPracticalCoach
          xcode-project build-ipa --project "PhysicsPracticalCoach.xcodeproj" --scheme "PhysicsPracticalCoach"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
