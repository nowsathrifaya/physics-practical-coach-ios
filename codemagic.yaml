workflows:
  ios-build:
    name: iOS Build (No Signing)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_SCHEME: "PhysicsPracticalCoach"
      xcode: latest

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Build project (No Code Signing)
        script: |
          xcodebuild \
            -project PhysicsPracticalCoach.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - /tmp/xcodebuild_logs/*.log
