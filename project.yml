name: PhysicsPracticalCoach
options:
  bundleIdPrefix: com.physicscoach
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: en
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  PhysicsPracticalCoach:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhysicsPracticalCoach
        excludes:
          - Resources/Info.plist
    info:
      path: PhysicsPracticalCoach/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.physicscoach.app
        PRODUCT_NAME: "Physics Practical Coach"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets: []
      gatherCoverageData: true
